<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Biblioteca Saturno</title>
    <link rel="stylesheet" href="Front_end/style.css" />
  </head>
  <body>
    <!--CABEÇALHO-->
    <header>
      <img class="icons" src="icones/planet-outline.svg" alt="" />
      <div class="input_and_titulo">
        <h1 class="titulo_principal">Biblioteca Saturno</h1>
        <input class="filtro" type="text" placeholder="Pesquisar" />
      </div>
      <img class="icons" src="icones/info.png" alt="" />
    </header>

    <!--MEIO-->
    <main>
      <!--ESPAÇO PARA LIVROS-->
      <section class="livros_container">
        <button id="btn_criar"><strong>+</strong></button>
      </section>
    </main>

    <!--CADASTRAR NOVO LIVRO-->
    <div class="div_cadastrar_livro" id="div_cadastrar_livro">
      <form class="form_cadastrar_livro" action="">
        <h1 class="btn_fechar" id="btn_fechar">X</h1>
        <!--ADICIONAR CAPA-->
        <label class="btn_cadastrar_capa" for="input_capa"
          ><img id="preview_capa" class="preview_capa" src="" alt=""
        /></label>
        <input class="input_capa" id="input_capa" type="file" />
        <p class="arquivo_escolhido" id="arquivo_escolhido">nenhum arquivo</p>

        <!--INFORMAÇOES-->
        <span class="labels_and_inputs"
          ><label for="input_titulo"><strong>Titulo</strong></label>
          <input
            type="text"
            class="input_titulo input_infos"
            id="input_titulo"
            placeholder="O senhor dos anéis..."
        /></span>

        <span class="labels_and_inputs"
          ><label for="input_autor">Autor</label>
          <input
            type="text"
            class="input_autor input_infos"
            id="input_autor"
            placeholder="Tolkien..."
        /></span>

        <span class="labels_and_inputs"
          ><label for="input_genero">Genero</label>
          <input
            type="text"
            class="input_genero input_infos"
            id="input_genero"
            placeholder="Terror..."
        /></span>

        <span class="labels_and_inputs"
          ><label for="input_paginas">Paginas</label>
          <input
            type="number"
            class="input_paginas input_infos"
            id="input_paginas"
            placeholder="Numero de Paginas"
        /></span>

        <span>
          <label for="formato_kindle">Kindle</label>
          <input type="checkbox" class="formato_kindle" id="formato_kindle" />

          <label for="formato_fisico">Fisico</label>
          <input type="checkbox" class="formato_fisico" id="formato_fisico" />

          <label for="formato_audiobook">Audiobook</label>
          <input
            type="checkbox"
            class="formato_audiobook"
            id="formato_audiobook"
          />
        </span>
        <button class="btn_cadastrar_livro" id="btn_cadastrar_livro">
          Cadastrar &rarr;
        </button>
      </form>
    </div>
    <!--RODAPÉ-->
    <footer>
      <span>
        <img src="" alt="" />
        <p></p>
      </span>
    </footer>
    <script src="Front_end/script.js"></script>
  </body>
</html>
